<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agenda de Contactos</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Agenda de Contactos</h1>

        <input type="text"
               id="nombre"
               placeholder="Nombre">

        <input type="text"
               id="telefono"
               placeholder="Teléfono">

        <input type="email"
               id="correo"
               placeholder="Correo">

        <button onclick="agregarContacto()">
            Agregar Contacto
        </button>

        <p id="mensaje"></p>

        <div id="listaContactos">

        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
